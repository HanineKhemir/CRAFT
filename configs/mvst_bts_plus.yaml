# ─────────────────────────────────────────────────────
# mvst_bts_plus.yaml  –  full MVST-BTS+ model config
# Inherits everything from base.yaml, overrides model
# ─────────────────────────────────────────────────────
base: configs/base.yaml

model:
  name: "MVSTBTSPlus"

  ast:
    pretrained_checkpoint: "MIT/ast-finetuned-audioset-10-10-0.4593"
    shared_weights: false      # independent encoder weights per branch
    patch_size: 16
    hidden_size: 768
    freeze_first_n_layers: 0  # fine-tune all layers

  metadata_mlp:
    enabled: true
    age_bins: 4                # child / young adult / adult / elderly
    device_vocab_size: 4       # AKGC417L, LittC2SE, Litt3200, Meditron
    location_vocab_size: 9     # 9 chest positions in ICBHI
    sex_vocab_size: 2
    embedding_dim: 64
    hidden_size: 256
    output_dim: 768            # projected to match AST hidden size

  gated_fusion:
    input_dim: 768
    num_views: 2               # fine + coarse branch

  classifier:
    hidden_dim: 768
    dropout: 0.3
    num_classes: 4